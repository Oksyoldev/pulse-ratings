name: Update Rating Stats and Reviews

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pymongo dnspython
        
    - name: Run update rating script
      env:
        MONGO_URL: ${{ secrets.MONGO_URL }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
      run: |
        python update_rating.py
        
    - name: Commit and push rating if changed
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        git add rating_stats.json
        if git diff --staged --quiet; then
          echo "No rating changes to commit."
        else
          git commit -m "Auto-update rating stats [skip ci]"
          git push origin main
          echo "Rating changes pushed."
        fi
        
    - name: Run export reviews script
      env:
        MONGO_URL: ${{ secrets.MONGO_URL }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
      run: |
        python export_reviews.py
        
    - name: Commit and push reviews and avatars if changed
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        git add reviews.json
        git add avatars/ --ignore-errors
        if git diff --staged --quiet; then
          echo "No reviews or avatars changes to commit."
        else
          git commit -m "Auto-update reviews and avatars [skip ci]"
          git push origin main
          echo "Reviews and avatars changes pushed."
        fi
